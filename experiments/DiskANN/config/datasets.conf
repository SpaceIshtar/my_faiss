# DiskANN Dataset configuration file
# Format:
# [dataset_name]
# key = value

[sift1M]
base_path = /data/local/embedding_dataset/sift1M
base_file = sift_base.fvecs
query_file = sift_query.fvecs
groundtruth_file = sift_groundtruth.ivecs
data_type = float
base_format = fvecs
query_format = fvecs
groundtruth_format = ivecs
sample_num = 0
add_batch_size = 200000
bin_file = sift_base.bin
threads = 16
k = 10
diskann_R = 64
diskann_L_build = 100
search_dram_budget_gb = 4.0
build_dram_budget_gb = 32.0
beam_width = 4
num_nodes_to_cache = 10000
L_search = 10,20,30,50,70,100,150,200

