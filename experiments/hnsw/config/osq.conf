# OSQ (Optimized Scalar Quantization) configuration
# Format:
# [dataset_name]
# encoding=<encoding>,similarity=<similarity>
#
# Supported encodings:
#   UNSIGNED_BYTE
#   PACKED_NIBBLE
#   SEVEN_BIT
#   SINGLE_BIT_QUERY_NIBBLE
#   DIBIT_QUERY_NIBBLE
#
# Supported similarities:
#   EUCLIDEAN
#   COSINE
#   DOT_PRODUCT
#   MAX_INNER_PRODUCT

[sift1M]
encoding=PACKED_NIBBLE,similarity=EUCLIDEAN
encoding=SINGLE_BIT_QUERY_NIBBLE,similarity=EUCLIDEAN
encoding=DIBIT_QUERY_NIBBLE,similarity=EUCLIDEAN
encoding=SEVEN_BIT,similarity=EUCLIDEAN

